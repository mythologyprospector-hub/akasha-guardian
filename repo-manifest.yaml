repo:
  name: akasha-guardian
  ecosystem: akasha
  version: 0.1.0
  status: active

engine:
  family: truth
  class: validation_engine
  role: integrity_and_boundary_guarding

identity:
  role: engine
  layer: governance
  description: >
    Guardian engine for the Akasha constellation.
    Responsible for protecting structural integrity, watching for invalid states,
    and helping ensure that downstream outputs remain within accepted bounds.

ownership:
  steward: human
  approval_required: true

interfaces:
  consumes:
    - event_records
    - pattern_outputs
    - validation_targets
    - constraint_inputs
  produces:
    - integrity_reports
    - boundary_alerts
    - guarded_validation_outputs

capabilities:
  - integrity_guarding
  - boundary_checking
  - invalid_state_detection
  - validation_alerting

alignment:
  axioms_required: true
  canonical_structure: true
  interpretation_free_core: true

depends_on:
  - akasha-events
  - akasha-attractor
  - akasha-validation
