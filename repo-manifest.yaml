repo:
  name: akasha-guardian
  ecosystem: akasha
  version: 0.1.0
  status: experimental

identity:
  role: guardian
  layer: governance
  description: >
    Alignment and integrity engine responsible for detecting
    structural drift and maintaining canonical order across
    the Akasha ecosystem.

ownership:
  steward: human
  approval_required: true
  governance: akasha-axioms

interfaces:
  consumes:
    - akasha-axioms
    - akasha-world
    - akasha-constellation

  produces:
    - drift_reports
    - alignment_recommendations
    - correction_proposals

capabilities:
  - manifest_validation
  - structural_inspection
  - naming_compliance
  - dependency_validation
  - drift_detection

alignment:
  axioms_required: true
  canonical_structure: true

execution:
  runtime: human-in-the-loop
  automation_level: advisory
